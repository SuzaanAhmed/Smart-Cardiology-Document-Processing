<!DOCTYPE html>
<html>
<head>
    <title>ECG AI Processor</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f0f7f9, #e6f0f3);
            margin: 0;
            padding: 0;
            color: #2c3e50;
        }

        .container {
            width: 60%;
            margin: 50px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            color: #1f6f8b;
        }

        .upload-box {
            text-align: center;
            padding: 25px;
            border: 2px dashed #1f6f8b;
            border-radius: 12px;
        }

        button {
            padding: 12px 28px;
            background: #1f6f8b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .alert-btn {
            background: linear-gradient(135deg, #ff6b6b, #ff3b3b);
            margin-top: 20px;
        }

        table {
            width: 100%;
            margin-top: 15px;
        }

        th {
            background: #1f6f8b;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            background: #f4f9fb;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🫀 ECG AI Processor</h1>

    <div class="upload-box">
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required><br><br>
            <button type="submit">Upload & Extract</button>
        </form>
    </div>

    {% if data %}
    <h2>Extracted Data</h2>

    <table>
        {% for key, value in data.items() %}
        <tr>
            <th>{{ key }}</th>
            <td>{{ value }}</td>
        </tr>
        {% endfor %}
    </table>

    <!-- 🚨 ALERT BUTTON -->
    <div style="text-align:center;">
        <a href="/alerts" target="_blank">
            <button class="alert-btn">
                🚨 Check Patient Condition
            </button>
        </a>
    </div>

    {% endif %}

</div>

<!-- OPTIONAL AUTO OPEN -->
{% if data %}
<script>
    setTimeout(() => {
        window.open("/alerts", "_blank");
    }, 1200);
</script>
{% endif %}

</body>
</html>
