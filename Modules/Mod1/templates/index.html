<!DOCTYPE html>
<html>
<head>
    <title>ECG AI Processor</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f0f7f9, #e6f0f3);
            margin: 0;
            padding: 0;
            color: #2c3e50;
        }

        .container {
            width: 60%;
            margin: 50px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            animation: fadeIn 0.8s ease-in-out;
        }

        h1 {
            text-align: center;
            color: #1f6f8b;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .upload-box {
            text-align: center;
            padding: 25px;
            border: 2px dashed #1f6f8b;
            border-radius: 12px;
            background: #f7fbfc;
            transition: 0.3s;
        }

        .upload-box:hover {
            background: #eef7fa;
            transform: scale(1.02);
        }

        input[type=file] {
            margin: 15px 0;
            font-size: 15px;
        }

        button {
            padding: 12px 28px;
            background: #1f6f8b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #145374;
            transform: scale(1.05);
        }

        .result-container {
            margin-top: 30px;
            animation: slideUp 0.5s ease-in-out;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            background: #1f6f8b;
            color: white;
            font-weight: 500;
        }

        td {
            background: #f9fcfd;
        }

        tr:nth-child(even) td {
            background: #f1f7f9;
        }

        tr:hover td {
            background: #e4f2f6;
        }

        /* Animations */
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideUp {
            from {transform: translateY(20px); opacity: 0;}
            to {transform: translateY(0); opacity: 1;}
        }

    </style>
</head>

<body>

<div class="container">

    <h1>🫀 ECG AI Processor</h1>

    <div class="upload-box">
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required><br>
            <button type="submit">Upload & Extract</button>
        </form>
    </div>

    {% if data %}
    <div class="result-container">
        <h2 style="text-align:center; color:#1f6f8b;">Extracted Data</h2>

        <table>
            {% for key, value in data.items() %}
            <tr>
                <th>{{ key }}</th>
                <td>{{ value }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
    {% endif %}

</div>

</body>
</html>
