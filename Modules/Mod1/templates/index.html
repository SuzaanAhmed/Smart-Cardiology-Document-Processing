<!DOCTYPE html>
<html>
<head>
    <title>ECG Processor</title>
    <style>
        body { font-family: Arial; background:#f4f6f9; text-align:center; }
        table { margin:auto; border-collapse:collapse; width:60%; background:white; }
        th, td { padding:10px; border:1px solid #ddd; }
        th { background:#3498db; color:white; }
        button { padding:10px; background:#3498db; color:white; border:none; }
    </style>
</head>
<body>

<h1>🫀 ECG AI Processor</h1>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required><br><br>
    <button>Upload & Extract</button>
</form>

{% if data %}
<h2>Results</h2>
<table>
{% for k,v in data.items() %}
<tr><th>{{k}}</th><td>{{v}}</td></tr>
{% endfor %}
</table>
{% endif %}

</body>
</html>
